<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в систему</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="login-container">
<h1>
    <span class="title-line title-main">💰 ФОТ</span>
    <span class="title-line title-sub">Volna Sea Village</span>
    <span class="title-line title-sub">Art-Life</span>
</h1>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
<div class="form-group">
<label>Логин</label>
<input type="text" name="username" required autofocus>
</div>
<div class="form-group">
<label>Пароль</label>
<input type="password" name="password" required>
</div>
<button type="submit" class="btn-login">Войти</button>
</form>
<div class="footer">
    © Created by Kalian Roman 2026 | Supported by <a href="https://fitofarm.ru" target="_blank">FitoFarm 🌿</a>
</div>
</div>
</body>
</html>
