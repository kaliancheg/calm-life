<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в систему</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Rajdhani', sans-serif; background: linear-gradient(135deg, #12162e 0%, #1e2052 50%, #151835 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-container { background: rgba(25, 28, 58, 0.9); padding: 50px; border-radius: 20px; border: 2px solid rgba(0, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0, 255, 255, 0.15); width: 100%; max-width: 400px; }
h1 { font-family: 'Orbitron', sans-serif; text-align: center; color: #00ffff; text-shadow: 0 0 20px rgba(0,255,255,0.5); margin-bottom: 30px; }
h1 .title-line { display: block; }
h1 .title-main { font-size: 1.4em; font-weight: 700; }
h1 .title-sub { font-size: 1em; font-weight: 400; color: #8a2be2; text-shadow: 0 0 15px rgba(138, 43, 226, 0.5); margin-top: 5px; }
.form-group { margin-bottom: 20px; }
label { color: #b8b8ff; display: block; margin-bottom: 8px; font-weight: 500; }
input { width: 100%; padding: 12px; border: 2px solid rgba(0, 255, 255, 0.35); border-radius: 10px; background: rgba(18, 20, 45, 0.85); color: #ffffff; font-family: 'Rajdhani', sans-serif; font-size: 16px; }
input:focus { outline: none; border-color: #00ffff; box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }
.btn-login { width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(135deg, rgba(0, 255, 255, 0.45), rgba(138, 43, 226, 0.45)); color: #ffffff; font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s; }
.btn-login:hover { box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
.error { background: rgba(255, 0, 0, 0.2); border: 1px solid rgba(255, 0, 0, 0.5); color: #ff6b6b; padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; }

/* Mobile responsive styles */
@media (max-width: 480px) {
    body { padding: 15px; }
    .login-container { padding: 30px 20px; }
    h1 { font-size: 1.4em; margin-bottom: 20px; }
    h1 .title-main { font-size: 1.3em; }
    h1 .title-sub { font-size: 0.9em; }
    .form-group { margin-bottom: 15px; }
    label { font-size: 0.95em; }
    input { padding: 10px; font-size: 15px; }
    .btn-login { padding: 12px; font-size: 15px; }
}

@media (max-width: 360px) {
    .login-container { padding: 25px 15px; }
    h1 { font-size: 1.2em; }
    h1 .title-main { font-size: 1.1em; }
    h1 .title-sub { font-size: 0.85em; }
}
</style>
</head>
<body>
<div class="login-container">
<h1>
    <span class="title-line title-main">💰 ФОТ</span>
    <span class="title-line title-sub">Volna Sea Village</span>
    <span class="title-line title-sub">Art-Life</span>
</h1>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
<div class="form-group">
<label>Логин</label>
<input type="text" name="username" required autofocus>
</div>
<div class="form-group">
<label>Пароль</label>
<input type="password" name="password" required>
</div>
<button type="submit" class="btn-login">Войти</button>
</form>
</div>
</body>
</html>
