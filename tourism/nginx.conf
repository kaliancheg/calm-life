# Конфигурация Nginx для calm-life.ru
# Интеграция с существующей инфраструктурой
server {
listen 443 ssl http2;
server_name calm-life.ru www.calm-life.ru;
# SSL сертификат Let's Encrypt
ssl_certificate /etc/letsencrypt/live/calm-life.ru/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/calm-life.ru/privkey.pem;
# SSL настройки
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
# Логгирование
access_log /var/log/nginx/calm-life-access.log;
error_log /var/log/nginx/calm-life-error.log;
client_max_body_size 10M;
# Xray Health Check - ПЕРВОЕ место в приоритете (точное совпадение)
location = /health {
proxy_pass http://127.0.0.1:4000;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
access_log off;
}
# Flask Application - все маршруты дашборда (через Unix socket)
location = /dashboard.html {
proxy_pass http://unix:/tmp/tourism-dashboard.sock;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_redirect off;
}
location /admin {
proxy_pass http://unix:/tmp/tourism-dashboard.sock;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_redirect off;
}
location /login {
proxy_pass http://unix:/tmp/tourism-dashboard.sock;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_redirect off;
}
location /api/ {
proxy_pass http://unix:/tmp/tourism-dashboard.sock;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_redirect off;
}
location /static {
proxy_pass http://unix:/tmp/tourism-dashboard.sock;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_redirect off;
}
# Статика сайта (CSS, JS, картинки)
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
root /var/www/calm-life;
expires 30d;
add_header Cache-Control "public, immutable";
}
# HTML страницы сайта
location ~ \.html$ {
root /var/www/calm-life;
try_files $uri =404;
}
# Корень сайта
location / {
root /var/www/calm-life;
index index.html;
try_files $uri $uri/ /index.html;
}
}
# HTTP редирект на HTTPS
server {
listen 80;
server_name calm-life.ru www.calm-life.ru;
return 301 https://$server_name$request_uri;
}

    # Дашборд - проксирование на Flask/Gunicorn
    location /dashboard.html {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket (если понадобится)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check для Xray
    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
    
    # Статические файлы дашборда (если будут)
    location /static {
        alias /var/www/calm-life/tourism/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTP редирект на HTTPS
server {
    listen 80;
    server_name calm-life.ru;
    return 301 https://$server_name$request_uri;
}
