server {
    listen 80;
    server_name calm-life.ru;

    # Перенаправление HTTP на HTTPS (раскомментируйте после настройки SSL)
    # return 301 https://$server_name$request_uri;

    # Логгирование
    access_log /var/log/nginx/calm-life-access.log;
    error_log /var/log/nginx/calm-life-error.log;

    # Размер тела запроса
    client_max_body_size 10M;

    # Дашборд - проксирование на Flask/Gunicorn
    location /dashboard.html {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket (если понадобится)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Статические файлы (если будут)
    location /static {
        alias /var/www/calm-life/tourism/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

